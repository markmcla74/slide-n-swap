<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

 <script>
  // Register the service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
 </script>
    <title>Slide 'n Swap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-wrapper">

        <div class="game-container">
            <div class="door door-left door-top"></div>
            <div class="door door-right door-top"></div>
            <div class="door door-left door-bottom"></div>
            <div class="door door-right door-bottom"></div>

            <div class="grid" id="game-grid">
                <div class="tile tile-1" data-tile-id="0"><div class="character-slot"></div></div>
                <div class="tile tile-2" data-tile-id="1"><div class="character-slot"></div></div>
                <div class="tile tile-3" data-tile-id="2"><div class="character-slot"></div></div>
                <div class="tile tile-4" data-tile-id="3"><div class="character-slot"></div></div>
                <div class="tile tile-5" data-tile-id="4"><div class="character-slot"></div></div>
                <div class="tile tile-6" data-tile-id="5"><div class="character-slot"></div></div>
                <div class="tile tile-7" data-tile-id="6"><div class="character-slot"></div></div>
                <div class="tile tile-empty" data-tile-id="7"><div class="character-slot"></div></div>
            </div>

            <div class="jewel-dashboard-row">
                <button id="btn-eye-solution" class="track-action-btn" title="Show Solution">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>

                <div class="jewel-track" id="jewel-track">
                    <div class="jewel"></div>
                    <div class="jewel"></div>
                    <div class="jewel"></div>
                    <div class="jewel"></div>
                    <div class="jewel"></div>
                    <div class="jewel"></div>
                    <div class="jewel"></div>
                    <div class="jewel"></div>
                    <div class="jewel"></div>
                    <div class="jewel"></div>
                </div>

                <button id="btn-menu-trigger" class="track-action-btn" title="Game Menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="4" y1="12" x2="20" y2="12"></line>
                        <line x1="4" y1="6" x2="20" y2="6"></line>
                        <line x1="4" y1="18" x2="20" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div class="menu-overlay" id="menu-overlay">
            <div class="menu-card">
                <h2 class="menu-title">Game Options</h2>

                <div class="menu-button-stack">
                    <button id="menu-btn-continue" class="menu-btn btn-prime">Continue</button>

                    <button id="menu-btn-reset" class="menu-btn btn-danger">Reset Board</button>

                    <div class="menu-scramble-wrapper">
                        <span class="scramble-mini-label">Scramble</span>
                        <div class="scramble-icons-row">
                            <button class="scramble-target-btn" id="scramble-easy" title="Easy Scramble">
                                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="#2ecc71"/></svg>
                            </button>
                            <button class="scramble-target-btn" id="scramble-medium" title="Medium Scramble">
                                <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" fill="#35a7ff"/></svg>
                            </button>
                            <button class="scramble-target-btn" id="scramble-hard" title="Hard Scramble">
                                <svg viewBox="0 0 24 24"><polygon points="12,2 22,12 12,22 2,12" fill="#e74c3c"/></svg>
                            </button>
                        </div>
                    </div>

                    <button id="menu-btn-info" class="menu-btn btn-info">Info &amp; Rules</button>
                </div>
            </div>
        </div>

    </div>

    <script src="puzzle_library_final.js"></script>
    <script src="animal_templates.js"></script>
    <script src="app.js"></script>
</body>
</html>
